---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: http-monitor
  namespace: default
  labels:
    app: http-monitor
spec:
  selector:
    matchLabels:
      app: http-monitor
  template:
    metadata:
      labels:
        app: http-monitor
      annotations:
        # Exercise 1: Add Prometheus scrape annotations here
        # Hint: prometheus.io/scrape: "true" and prometheus.io/port: "9090"
    spec:
      serviceAccountName: http-monitor
      hostPID: true
      hostNetwork: true
      containers:
        - name: http-monitor
          # Exercise 2: Set image to http-monitor:v1.0
          image: YOUR_IMAGE_HERE
          imagePullPolicy: Never
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RESOURCE
                - NET_ADMIN
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            limits:
              memory: 200Mi
              cpu: 100m
            requests:
              memory: 100Mi
              cpu: 50m
          volumeMounts:
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: kubelet-pods
              mountPath: /var/lib/kubelet/pods
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: kubelet-pods
          hostPath:
            path: /var/lib/kubelet/pods
            type: Directory
      # Exercise 3: Add tolerations for control-plane nodes
      # Hint: key: node-role.kubernetes.io/control-plane
