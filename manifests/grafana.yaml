# ============================================================================
# REFERENCE ONLY — the Instruqt lab does NOT apply this file.
#
# In the lab, Grafana + Prometheus are provided by the sandbox's
# kube-prometheus-stack (namespace: monitoring, Grafana at NodePort 32042),
# started in challenge 01. This manifest is a standalone, self-contained
# alternative you can apply yourself to run the same dashboard without that
# stack:
#
#   kubectl apply -f manifests/prometheus.yaml
#   kubectl apply -f manifests/grafana.yaml
#   # Grafana: http://<node-ip>:30000  (anonymous admin, dashboard uid http-monitor)
#
# It deploys a minimal Grafana (anonymous auth, port 3000, NodePort 30000) and
# Prometheus in the `default` namespace, scraping the http-monitor Service.
# ============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.default.svc.cluster.local:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "5s"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: default
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/provisioning/dashboards
  http-monitor.json: |
    {
      "title": "HTTP Monitor Dashboard",
      "uid": "http-monitor",
      "version": 1,
      "schemaVersion": 38,
      "tags": ["ebpf", "http"],
      "panels": [
        {
          "id": 1,
          "title": "HTTP Requests Rate",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(http_requests_total[1m])",
              "legendFormat": "{{comm}} - {{method}} {{path}}",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 0},
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "bottom"
            }
          }
        },
        {
          "id": 2,
          "title": "Requests by Process",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m])) by (comm)",
              "legendFormat": "{{comm}}",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 0}
        },
        {
          "id": 3,
          "title": "Total Requests",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(http_requests_total)",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 9}
        },
        {
          "id": 4,
          "title": "Current Rate",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[1m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 9}
        }
      ],
      "refresh": "5s",
      "time": {"from": "now-15m", "to": "now"},
      "timezone": "browser",
      "editable": true
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/etc/grafana/provisioning/dashboards/http-monitor.json"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
      protocol: TCP
  selector:
    app: grafana
